<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NA Skills">
<title>NA Skills Evaluator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --green:#2e7d32;--green-light:#e8f5e9;--green-mid:#a5d6a7;
    --red:#c62828;--red-light:#ffebee;--red-border:#ef9a9a;
    --amber:#e65100;--amber-light:#fff3e0;--amber-border:#ffcc80;
    --blue:#1565c0;--blue-light:#e3f2fd;--blue-border:#90caf9;
    --gray:#5f5f5f;--gray-light:#f5f5f5;--gray-border:#e0e0e0;
    --text:#212121;--text2:#616161;--text3:#9e9e9e;
    --white:#fff;--radius:10px;--radius-sm:7px;
  }
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:16px;color:var(--text);background:#f0f0f0}
  .app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;background:#f0f0f0}

  /* Top bar */
  .topbar{background:var(--green);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 4px rgba(0,0,0,.15)}
  .topbar h1{font-size:17px;font-weight:600;color:#fff;flex:1}
  .topbar .sub{font-size:12px;color:rgba(255,255,255,.8);font-weight:400}
  .tb-btn{background:rgba(255,255,255,.2);border:none;border-radius:var(--radius-sm);padding:7px 12px;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
  .tb-btn:active{background:rgba(255,255,255,.35)}
  .tb-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Student bar */
  .student-bar{background:#fff;border-bottom:1px solid var(--gray-border);padding:8px 16px;display:flex;align-items:center;flex-shrink:0}
  .student-bar>*+*{margin-left:8px}
  .student-bar label{font-size:12px;color:var(--text2);white-space:nowrap}
  .student-bar select{flex:1;font-size:14px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:6px 8px;background:#fff;color:var(--text);-webkit-appearance:none;min-width:0}
  .add-btn{background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius-sm);padding:6px 12px;color:var(--green);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .add-btn:active{opacity:.7}
  .add-btn svg{width:15px;height:15px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round}

  /* Skill tabs */
  .tabs-wrap{background:#fff;border-bottom:1px solid var(--gray-border);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tabs{display:flex;padding:0 12px;gap:0;min-width:max-content}
  .tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--text2);border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}
  .tab-badge{font-size:11px;padding:1px 6px;border-radius:20px;font-weight:600}
  .tab-badge.fail{background:var(--red-light);color:var(--red)}
  .tab-badge.warn{background:var(--amber-light);color:var(--amber)}

  /* Scrollable content */
  .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}

  /* Welcome / empty */
  .empty{text-align:center;padding:60px 24px;color:var(--text2)}
  .empty svg{width:52px;height:52px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:16px}
  .empty h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
  .empty p{font-size:14px;line-height:1.6}

  /* Skill select */
  .section-title{font-size:17px;font-weight:600;margin-bottom:4px}
  .section-sub{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
  .pick-counter{text-align:center;font-size:14px;color:var(--text2);margin-bottom:12px;padding:8px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--gray-border)}
  .pick-counter strong{color:var(--green);font-size:18px}
  .pick-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .pick-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s;min-height:52px}
  .pick-item.selected{background:var(--green-light);border-color:var(--green-mid)}
  .pick-item.disabled{opacity:.38;cursor:default}
  .pick-num{font-size:12px;font-weight:600;color:var(--text2);min-width:48px}
  .pick-item.selected .pick-num{color:var(--green)}
  .pick-name{flex:1;font-size:14px;color:var(--text);line-height:1.4}
  .pick-item.selected .pick-name{color:var(--green);font-weight:500}
  .pick-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff}
  .pick-item.selected .pick-circle{background:var(--green);border-color:var(--green)}
  .pick-circle svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;display:none}
  .pick-item.selected .pick-circle svg{display:block}
  .start-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .start-btn:disabled{background:var(--gray-border);color:var(--text3);cursor:default}
  .start-btn:not(:disabled):active{background:#1b5e20}
  .start-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .start-btn:disabled svg{stroke:var(--text3)}

  /* Skill eval */
  .skill-header{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-border);padding:12px 14px;margin-bottom:10px}
  .skill-title{font-size:16px;font-weight:600;margin-bottom:4px}
  .skill-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .skill-meta span{font-size:12px;color:var(--text2)}
  .verdict-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
  .verdict-badge.fail{background:var(--red-light);color:var(--red)}
  .verdict-badge.warn{background:var(--amber-light);color:var(--amber)}
  .crit-key{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);margin-bottom:8px;padding:0 2px}
  .crit-stripe{width:4px;height:16px;background:var(--amber);border-radius:2px;flex-shrink:0}
  .step-list{display:flex;flex-direction:column;gap:5px}
  .step{display:flex;align-items:flex-start;gap:10px;padding:13px 12px;background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius-sm);cursor:pointer;-webkit-user-select:none;user-select:none;min-height:48px}
  .step.critical{border-left:4px solid var(--amber)}
  .step.not-met{background:var(--red-light);border-color:var(--red-border)}
  .step.not-met.critical{border-left-color:var(--red)}
  .step-num{font-size:12px;color:var(--text3);min-width:20px;padding-top:2px;font-weight:600;text-align:right}
  .step.critical .step-num{color:var(--amber)}
  .step.not-met .step-num{color:var(--red)}
  .step-text{flex:1;font-size:14px;line-height:1.5;color:var(--text)}
  .step.critical .step-text{font-weight:500}
  .step.not-met .step-text{color:var(--red)}
  .step-toggle{width:26px;height:26px;border-radius:50%;border:2px solid var(--gray-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;margin-top:1px}
  .step.not-met .step-toggle{background:var(--red);border-color:var(--red)}
  .step.not-met .step-toggle svg{display:block}
  .step-toggle svg{display:none;width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  .action-btns{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .ghost-btn{padding:12px;background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:500}
  .ghost-btn:active{background:var(--gray-light)}
  .ghost-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Modal */
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
  .sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px 20px max(20px,env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto}
  .sheet-handle{width:40px;height:4px;background:var(--gray-border);border-radius:2px;margin:0 auto 16px}
  .sheet h2{font-size:18px;font-weight:600;margin-bottom:14px}
  .sheet input{width:100%;padding:12px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:16px;color:var(--text);background:#fff;margin-bottom:12px;-webkit-appearance:none;outline:none}
  .sheet input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-light)}
  .sheet-btns{display:flex;gap:10px}
  .sheet-btns button{flex:1;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;border:none}
  .btn-cancel{background:var(--gray-light);color:var(--text2)}
  .btn-confirm{background:var(--green);color:#fff}
  .btn-cancel:active{opacity:.7}
  .btn-confirm:active{background:#1b5e20}
  .summary-item{background:var(--gray-light);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden}
  .summary-item-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
  .summary-item-bottom{display:flex;align-items:center;gap:8px;padding:0 14px 10px;border-top:1px solid var(--gray-border)}
  .summary-name{font-size:15px;font-weight:500}
  .summary-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill.fail{background:var(--red-light);color:var(--red)}
  .pill.warn{background:var(--amber-light);color:var(--amber)}
  .pill.ok{background:var(--green-light);color:var(--green)}
  .pf-label{font-size:12px;color:var(--text2);white-space:nowrap}
  .pf-btn{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
  .pf-btn.pass{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}
  .pf-btn.pass.active{background:var(--green);color:#fff;border-color:var(--green)}
  .pf-btn.fail{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
  .pf-btn.fail.active{background:var(--red);color:#fff;border-color:var(--red)}
  .pf-btn:active{opacity:.8}
  .pf-final{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;margin-left:auto}
  .pf-final.pass{background:var(--green);color:#fff}
  .pf-final.fail{background:var(--red);color:#fff}
  .pf-final.none{background:var(--gray-border);color:var(--text2)}
  .export-btn{width:100%;padding:13px;background:var(--blue-light);border:1px solid var(--blue-border);border-radius:var(--radius);color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px}
  .export-btn svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .export-btn:active{opacity:.7}
  .export-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px}
  .export-row{display:flex;gap:8px;margin-top:0}
  .export-row button{flex:1;padding:11px 6px;border-radius:var(--radius-sm);border:1px solid var(--blue-border);background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
  .export-row button:active{opacity:.7}
  .export-row button svg{width:20px;height:20px;stroke:var(--blue);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .export-row button span{font-size:11px;font-weight:500}
  .no-skill-msg{font-size:13px;color:var(--text2);padding:4px 0}

  /* Timer */
  .timer-bar{background:#1b5e20;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
  .timer-bar.warn{background:#b71c1c}
  .timer-bar.paused{background:#4a4a4a}
  .timer-display{font-size:20px;font-weight:700;color:#fff;letter-spacing:.05em;font-variant-numeric:tabular-nums;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',monospace}
  .timer-label{font-size:11px;color:rgba(255,255,255,.75);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
  .timer-left{display:flex;flex-direction:column;gap:1px}
  .timer-pause-btn{background:rgba(255,255,255,.2);border:none;border-radius:var(--radius-sm);padding:6px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .timer-pause-btn:active{background:rgba(255,255,255,.35)}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="topbar">
    <div style="flex:1">
      <h1>NA Skills Evaluator</h1>
    </div>
    <button class="tb-btn" onclick="showSummary()">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Summary
    </button>
  </div>

  <div class="timer-bar" id="timerBar" style="display:none">
    <div class="timer-left">
      <span class="timer-label" id="timerLabel">Exam Timer</span>
      <span class="timer-display" id="timerDisplay">35:00</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="timer-pause-btn" id="timerPauseBtn" onclick="timerTogglePause()">Pause</button>
      <button class="timer-pause-btn" id="timerEndBtn" onclick="timerEndExam()" style="display:none;background:rgba(255,255,255,.35)">End Exam</button>
    </div>
  </div>

  <div class="student-bar">
    <label>Student:</label>
    <select id="studentSel" onchange="switchStudent(this.value)">
      <option value="">— select —</option>
    </select>
    <button class="add-btn" onclick="showAddStudent()">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Add
    </button>
  </div>

  <div class="tabs-wrap" id="tabsWrap" style="display:none">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="content" id="content">
    <div class="empty">
      <svg viewBox="0 0 24 24" style="display:block;margin:0 auto 16px"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      <h2>Add a student to begin</h2>
      <p>Tap <strong>Add</strong> above, then choose 5 skills for the exam.</p>
    </div>
  </div>
</div>

<div id="overlay" class="overlay" style="display:none">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>

    <!-- Add Student panel -->
    <div id="panelAddStudent" style="display:none">
      <h2>Add student</h2>
      <input id="nameIn" placeholder="Student name" type="text" autocomplete="off">
      <div class="sheet-btns">
        <button class="btn-cancel" id="btnAddCancel">Cancel</button>
        <button class="btn-confirm" id="btnAddConfirm">Add</button>
      </div>
    </div>

    <!-- Summary panel -->
    <div id="panelSummary" style="display:none">
      <h2>Summary</h2>
      <div id="summaryRows" style="margin-bottom:4px"></div>
      <p class="export-label">Export as</p>
      <div class="export-row">
        <button id="btnExportPDF">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>PDF</span>
        </button>
        <button id="btnExportCSV">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          <span>CSV</span>
        </button>
        <button id="btnExportTXT">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Text</span>
        </button>
      </div>
      <div style="height:10px"></div>
      <button id="btnSummClose" style="width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:none;background:#f0f0f0;color:#616161">Close</button>
      <div style="height:8px"></div>
      <button id="btnClearAll" style="width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--red-border);background:var(--red-light);color:var(--red)">🗑 Clear all students</button>
    </div>

    <!-- Confirm clear panel -->
    <div id="panelConfirmClear" style="display:none">
      <h2>Clear all students?</h2>
      <p style="font-size:14px;color:#616161;margin-bottom:16px;line-height:1.5">This will permanently delete all student records. Make sure you have exported first.</p>
      <div class="sheet-btns">
        <button class="btn-cancel" id="btnClearBack">Go back</button>
        <button id="btnClearConfirm" style="flex:1;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;border:none;background:var(--red);color:#fff">Yes, clear all</button>
      </div>
    </div>

  </div>
</div>

<script>
const SKILLS=[
  {num:1,title:"Hand Hygiene (Hand Washing)",steps:[
    {t:"Addresses client by name and introduces self to client by name",c:false},
    {t:"Turns on water at sink",c:false},
    {t:"Wets hands and wrists thoroughly",c:false},
    {t:"Applies soap to hands",c:false},
    {t:"Lathers all surfaces of wrists, hands, and fingers for at least 20 seconds, hands lower than elbows, fingertips down",c:true},
    {t:"Cleans fingernails by rubbing fingertips against palms of opposite hand",c:false},
    {t:"Rinses all surfaces of wrists, hands, and fingers, hands lower than elbows, fingertips down",c:true},
    {t:"Uses clean dry paper towel to dry all surfaces starting at fingertips; disposes into waste container",c:false},
    {t:"Uses clean dry paper towel to turn off faucet then disposes, or uses knee/foot control",c:false},
    {t:"Does not touch inside of sink at any time",c:false},
  ]},
  {num:2,title:"Applies One Knee-High Elastic Stocking",steps:[
    {t:"Explains procedure clearly, slowly, and directly; maintains face-to-face contact whenever possible",c:false},
    {t:"Privacy provided with curtain, screen, or door",c:false},
    {t:"Client is in supine position while stocking is applied",c:false},
    {t:"Adjusts bed to approximately waist height",c:false},
    {t:"Turns stocking inside-out at least to the heel",c:false},
    {t:"Places foot of stocking over toes, foot, and heel",c:false},
    {t:"Pulls top of stocking over foot, heel, and leg",c:false},
    {t:"Moves foot and leg gently and naturally, avoiding force and overextension",c:false},
    {t:"Finishes with no twists or wrinkles; heel over heel; toe opening over or under toe area",c:true},
    {t:"Signaling device within reach and bed in low position",c:false},
    {t:"After completing skill, washes hands",c:false},
  ]},
  {num:3,title:"Assists to Ambulate Using Transfer Belt",steps:[
    {t:"Explains procedure clearly, slowly, and directly; maintains face-to-face contact whenever possible",c:false},
    {t:"Privacy provided with curtain, screen, or door",c:false},
    {t:"Client is wearing non-skid shoes/footwear before assisting to stand",c:true},
    {t:"Bed is at a safe level before assisting to stand",c:false},
    {t:"Checks and/or locks bed wheels before assisting to stand",c:false},
    {t:"Client assisted to sitting position with feet flat on floor before standing",c:true},
    {t:"Applies transfer belt securely at waist over clothing/gown",c:false},
    {t:"Provides instructions and prearranged signal to alert client to begin standing",c:false},
    {t:"Stands facing client; counts to three (or prearranged signal) to alert client",c:false},
    {t:"Grasps belt on both sides with upward grasp; maintains stability knee-to-knee or toe-to-toe",c:false},
    {t:"Walks slightly behind and to one side of client for 10 feet, holding the belt",c:false},
    {t:"Assists client to bed and removes transfer belt",c:false},
    {t:"Signaling device within reach and bed in low position",c:false},

const MAX=5;
const LOCKED=0; /* Hand Hygiene index — always included, always tab 0 */
const KEY='na_eval_v1';
let S={students:{},cur:null,tab:0};

function ls(){try{const r=localStorage.getItem(KEY);if(r)S=JSON.parse(r);}catch(e){}}
function ss(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}

function student(){return S.cur?S.students[S.cur]:null;}
function sel(){
  /* Always hand hygiene first, then the student's chosen 4 */
  const st=student();if(!st)return[];
  const chosen=(st.skills_selected||[]).filter(i=>i!==LOCKED);
  return[LOCKED,...chosen];
}
function ready(){
  const st=student();if(!st)return false;
  const chosen=(st.skills_selected||[]).filter(i=>i!==LOCKED);
  return chosen.length===MAX-1;
}
function checks(sid,gi){var s=S.students[sid];return(s&&s.checks&&s.checks[gi])||{};}
function verdict(sid,gi){
  const sk=SKILLS[gi],ch=checks(sid,gi);
  if(!Object.values(ch).some(v=>v))return'none';
  return sk.steps.some((s,i)=>s.c&&ch[i])?'fail':'warn';
}

function renderAll(){
  renderSel();
  const sid=S.cur,st=student();
  if(!sid||!st){
    document.getElementById('tabsWrap').style.display='none';
    document.getElementById('content').innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" style="display:block;margin:0 auto 16px;width:52px;height:52px;stroke:#bbb;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg><h2>Add a student to begin</h2><p>Tap <strong>Add</strong> above, then choose 5 skills for the exam.</p></div>`;
    return;
  }
  if(!ready()){document.getElementById('tabsWrap').style.display='none';renderPickScreen();}
  else{document.getElementById('tabsWrap').style.display='block';renderTabs();renderEval(S.tab);timerShowEndBtn(S.tab===sel().length-1);}
}

function renderSel(){
  const el=document.getElementById('studentSel');
  const names=Object.keys(S.students).sort();
  el.innerHTML='<option value="">— select —</option>'+names.map(n=>`<option value="${n}"${n===S.cur?' selected':''}>${n}</option>`).join('');
}

function renderPickScreen(){
  const st=student();
  const chosen=((st&&st.skills_selected)||[]).filter(i=>i!==LOCKED);
  const count=chosen.length;
  const need=MAX-1;
  document.getElementById('content').innerHTML=`
    <p class="section-title">Choose 4 more skills for ${S.cur}</p>
    <p class="section-sub">Hand Hygiene is always first. Pick 4 more to start the exam.</p>
    <div class="pick-counter">Selected: <strong>${count}</strong> / ${need}</div>
    <div class="pick-list">${SKILLS.map((sk,i)=>{
      if(i===LOCKED){
        return`<div class="pick-item selected" style="cursor:default;opacity:.75">
          <span class="pick-num">Skill ${sk.num}</span>
          <span class="pick-name">${sk.title}</span>
          <span style="font-size:11px;color:var(--green);font-weight:600;white-space:nowrap">Always first</span>
        </div>`;
      }
      const isSel=chosen.includes(i),isDis=!isSel&&count>=need;
      return`<div class="pick-item${isSel?' selected':''}${isDis?' disabled':''}" onclick="togglePick(${i})">
        <span class="pick-num">Skill ${sk.num}</span>
        <span class="pick-name">${sk.title}</span>
        <div class="pick-circle"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>`;
    }).join('')}</div>
    <button class="start-btn" onclick="startExam()" ${count<need?'disabled':''}>
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start Exam
    </button>`;
}

function togglePick(gi){
  if(gi===LOCKED)return; /* can't deselect Hand Hygiene */
  const st=student();if(!st)return;
  if(!st.skills_selected)st.skills_selected=[];
  /* work only with the non-locked choices */
  const chosen=st.skills_selected.filter(i=>i!==LOCKED);
  const idx=chosen.indexOf(gi);
  if(idx>=0)chosen.splice(idx,1);
  else if(chosen.length<MAX-1)chosen.push(gi);
  st.skills_selected=chosen; /* store without locked — sel() adds it back */
  ss();renderPickScreen();
}

function startExam(){if(!ready())return;S.tab=0;ss();renderAll();timerStart();}

function renderTabs(){
  const sid=S.cur;
  document.getElementById('tabs').innerHTML=sel().map((gi,ti)=>{
    const v=verdict(sid,gi),sk=SKILLS[gi];
    const cnt=Object.values(checks(sid,gi)).filter(Boolean).length;
    const badge=cnt?`<span class="tab-badge ${v}">${cnt}</span>`:'';
    return`<button class="tab${ti===S.tab?' active':''}" onclick="switchTab(${ti})">Skill ${sk.num}${badge}</button>`;
  }).join('');
}

function switchTab(ti){S.tab=ti;ss();renderTabs();renderEval(ti);timerShowEndBtn(ti===sel().length-1);}

function renderEval(ti){
  const gi=sel()[ti],sk=SKILLS[gi],sid=S.cur;
  const ch=checks(sid,gi),hasCrit=sk.steps.some(s=>s.c);
  const v=verdict(sid,gi);
  const vLabel={fail:'✗ Critical step not met',warn:'⚠ Needs review'}[v]||'';
  document.getElementById('content').innerHTML=`
    <div class="skill-header">
      <div class="skill-title">Skill #${sk.num}: ${sk.title}</div>
      <div class="skill-meta">
        <span>${sk.steps.length} steps</span>
        ${v!=='none'?`<span class="verdict-badge ${v}">${vLabel}</span>`:''}
      </div>
    </div>
    ${hasCrit?`<div class="crit-key"><div class="crit-stripe"></div><span>Left border = critical step (bold on state form)</span></div>`:''}
    <div class="step-list">${sk.steps.map((s,i)=>{
      const nm=ch[i]||false;
      return`<div class="step${s.c?' critical':''}${nm?' not-met':''}" onclick="tap(${gi},${i})">
        <span class="step-num">${i+1}</span>
        <span class="step-text">${s.t}</span>
        <div class="step-toggle"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>`;
    }).join('')}</div>
    <div class="action-btns">
      <button class="ghost-btn" onclick="timerStart()" style="background:var(--green-light);border-color:var(--green-mid);color:var(--green)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${timerRunning||timerSecondsLeft<TIMER_TOTAL?'Restart Timer (35 min)':'Start Timer (35 min)'}
      </button>
      <button class="ghost-btn" onclick="resetSkill(${gi})">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        Reset this skill
      </button>
      <button class="ghost-btn" onclick="changeSkills()">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Change skill selection
      </button>
    </div>`;
}

function autoVerdict(sid){
  /* Auto-set finalVerdict to 'fail' if any critical step is not met across
     selected skills. If no critical steps are missed, clear an auto-set fail
     (but leave a manually-set pass alone, and never clear a manual override). */
  const st=S.students[sid];if(!st)return;
  const selected=st.skills_selected||[];
  const anyCritMissed=selected.some(gi=>{
    const sk=SKILLS[gi],ch=checks(sid,gi);
    return sk.steps.some((s,i)=>s.c&&ch[i]);
  });
  if(anyCritMissed){
    st.finalVerdict='fail';
  } else if(st.finalVerdict==='fail'){
    /* only clear fail if it was auto-set (no critical steps missed anymore) */
    st.finalVerdict=null;
  }
}

function tap(gi,si){
  if(!S.cur)return;
  const st=S.students[S.cur];
  if(!st.checks)st.checks={};
  if(!st.checks[gi])st.checks[gi]={};
  st.checks[gi][si]=!st.checks[gi][si];
  autoVerdict(S.cur);
  ss();renderTabs();renderEval(S.tab);
}

function resetSkill(gi){
  const st=student();if(!st)return;
  if(st.checks)st.checks[gi]={};
  autoVerdict(S.cur);
  ss();renderTabs();renderEval(S.tab);
}

function changeSkills(){
  const st=student();if(!st)return;
  st.skills_selected=[];
  /* keep Hand Hygiene checks, clear the rest */
  var hChecks=st.checks&&st.checks[LOCKED];
  st.checks={};
  if(hChecks)st.checks[LOCKED]=hChecks;
  ss();renderAll();
}

function switchStudent(name){S.cur=name||null;S.tab=0;ss();renderAll();}

/* ── Summary ── */
function setFinalVerdict(name,val){
  var cur=S.students[name]&&S.students[name].finalVerdict;
  S.students[name].finalVerdict=(cur===val?null:val);
  ss();showSummary();
}

function showSummary(){
  var names=Object.keys(S.students).sort();
  var rows='';
  if(!names.length){
    rows='<p style="color:#616161;font-size:14px;padding:8px 0">No students added yet.</p>';
  } else {
    for(var ni=0;ni<names.length;ni++){
      var name=names[ni];
      var st=S.students[name];
      var chosen=(st.skills_selected||[]).filter(function(i){return i!==LOCKED;});
      var allSelected=[LOCKED].concat(chosen);
      var fv=st.finalVerdict||null;
      var f=0,w=0,ok=0;
      for(var xi=0;xi<allSelected.length;xi++){
        var v=verdict(name,allSelected[xi]);
        if(v==='fail')f++;else if(v==='warn')w++;else ok++;
      }
      var pills=(f?'<span class="pill fail">'+f+' crit</span>':'')
               +(w?'<span class="pill warn">'+w+' review</span>':'')
               +'<span class="pill ok">'+ok+' ok</span>';
      var badge=fv?'<span class="pf-final '+fv+'">'+(fv==='pass'?'✓ PASS':'✗ FAIL')+'</span>'
                  :'<span class="pf-final none">Pending</span>';
      var elapsed=st.elapsed?'<span style="font-size:12px;color:var(--text2);margin-left:4px">⏱ '+st.elapsed+'</span>':'';
      rows+='<div class="summary-item">'
        +'<div class="summary-item-top"><span class="summary-name">'+name+'</span>'+elapsed
        +'<div class="summary-pills">'+pills+'</div></div>'
        +'<div class="summary-item-bottom">'
          +'<span class="pf-label">Final verdict:</span>'
          +'<button class="pf-btn pass'+(fv==='pass'?' active':'')+'" data-sname="'+encodeURIComponent(name)+'" data-val="pass">Pass</button>'
          +'<button class="pf-btn fail'+(fv==='fail'?' active':'')+'" data-sname="'+encodeURIComponent(name)+'" data-val="fail">Fail</button>'
          +badge
        +'</div>'
      +'</div>';
    }
  }
  document.getElementById('summaryRows').innerHTML=rows;
  showPanel('panelSummary');
}

function confirmClearAll(){
  showPanel('panelConfirmClear');
}

function clearAllStudents(){
  S.students={};S.cur=null;S.tab=0;
  ss();closeSheet();renderAll();
}


function buildExportData(){
  const names=Object.keys(S.students).sort();
  return names.map(name=>{
    const st=S.students[name];
    const chosen=(st.skills_selected||[]).filter(i=>i!==LOCKED);
    const allSelected=[LOCKED,...chosen];
    return {
      name,
      finalVerdict: st.finalVerdict||null,
      elapsed: st.elapsed||null,
      skills: allSelected.map(gi=>{
        const sk=SKILLS[gi],ch=checks(name,gi);
        const notMet=sk.steps.map((s,i)=>ch[i]?i+1:null).filter(Boolean);
        const v=verdict(name,gi);
        const notMetDetails=sk.steps.map((s,i)=>ch[i]?{num:i+1,text:s.t,critical:s.c}:null).filter(Boolean);
        return{num:sk.num,title:sk.title,verdict:v,notMet,notMetDetails};
      })
    };
  });
}

/* ── TEXT export ── */
function doExportTXT(){
  const date=new Date().toLocaleDateString();
  let out=`NA SKILLS LAB EVALUATION\nDate: ${date}\n${'='.repeat(44)}\n\n`;
  buildExportData().forEach(({name,finalVerdict,elapsed,skills})=>{
    const fvLabel=finalVerdict?finalVerdict.toUpperCase():'PENDING';
    out+=`STUDENT: ${name}\nFINAL RESULT: ${fvLabel}${elapsed?' | TIME: '+elapsed:''}\n${'-'.repeat(30)}\n`;
    if(!skills.length){out+=`  No skills selected\n\n`;return;}
    skills.forEach(({num,title,verdict:v,notMet})=>{
      const lbl=v==='none'?'PASS':v==='fail'?'CRITICAL STEP NOT MET':'NEEDS REVIEW';
      out+=`  Skill #${num} — ${title}: ${lbl}\n`;
      if(notMet.length)out+=`    Steps not met: ${notMet.join(', ')}\n`;
    });
    out+='\n';
  });

/* ── CSV export ── */
function doExportCSV(){
  const date=new Date().toLocaleDateString();
  const rows=[['Date','Student','Time','Overall Result','Skill #','Skill Title','Skill Result','Steps Not Met (numbers)','Steps Not Met (detail)']];
  buildExportData().forEach(({name,finalVerdict,elapsed,skills})=>{
    const fvLabel=finalVerdict?finalVerdict.toUpperCase():'PENDING';
    if(!skills.length){rows.push([date,name,elapsed||'',fvLabel,'','','No skills selected','','']);return;}
    skills.forEach(({num,title,verdict:v,notMet,notMetDetails},i)=>{
      const skillLbl=v==='none'?'PASS':v==='fail'?'CRITICAL STEP NOT MET':'NEEDS REVIEW';
      const detail=notMetDetails.map(s=>`${s.num}. ${s.text}${s.critical?' [CRITICAL]':''}`).join(' | ');
      rows.push([date,name,i===0?(elapsed||''):'',i===0?fvLabel:'',num,title,skillLbl,notMet.join(', '),detail]);
    });
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  dl('data:text/csv;charset=utf-8,'+encodeURIComponent(csv),`NA_Skills_${stamp()}.csv`);
}

    pdf.rect(40,pdf.y,pdf.w,36,true);

    }

    pdf.y+=18;

      pdf.setFill(GRAY);
      pdf.text('Time: '+data[si].elapsed,pdf.margin,pdf.y,10,false);
      pdf.y+=16;

/* ── tiny self-contained PDF writer ── */
class MiniPDF{
  constructor(){
    this.pageW=595;this.pageH=842;
    this.margin=40;this.w=this.pageW-this.margin*2;
    this.fillColor='0 0 0';
    this.y=this.margin;
    /* Each page is just a string stream; we collect them all */
    this.pageStreams=[];
    this.currentStream='';
    /* Start first page */
    this.pageStreams.push(null); /* placeholder, filled on next addPage or build */
  }
  _savePage(){
    /* save current stream into the last slot */
    this.pageStreams[this.pageStreams.length-1]=this.currentStream;
  }
  addPage(){
    this._savePage();
    this.currentStream='';
    this.y=this.margin;
    this.pageStreams.push(null);
  }
  checkPage(need){if(this.y+need>this.pageH-this.margin-20)this.addPage();}
  setFill(c){this.fillColor=c;this.currentStream+=c+' rg\n';}
  rect(x,y,w,h,fill){
    this.currentStream+=`${x} ${this.pageH-y-h} ${w} ${h} re ${fill?'f':'S'}\n`;
  }
  line(x1,y1,x2,y2){
    this.currentStream+=`0.7 G ${x1} ${this.pageH-y1} m ${x2} ${this.pageH-y1} l S 0 G\n`;
  }
  _esc(s){return String(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');}
  text(str,x,y,size,bold,rightAlign){
    const fn=bold?'F2':'F1';
    const esc=this._esc(str);
    let tx=x;
    if(rightAlign){tx=x-esc.length*size*0.45;}
    this.currentStream+=`BT /${fn} ${size} Tf ${tx} ${this.pageH-y} Td (${esc}) Tj ET\n`;
  }
  textWrap(str,x,y,maxW,size){
    const words=str.split(' ');
    const charsPerLine=Math.floor(maxW/(size*0.52));
    let line='';
    words.forEach(w=>{
      if((line+' '+w).trim().length>charsPerLine){
        this.text(line.trim(),x,this.y,size,false);
        this.y+=size+3;
        this.checkPage(14);
        line=w;
      } else {
        line=(line+' '+w).trim();
      }
    });
    if(line){this.text(line,x,this.y,size,false);}
    this.y+=size+3;
  }
  build(){
    /* save the last page */
    this._savePage();

    /* PDF object array — we build sequentially */
    const objs=[]; /* {type:'dict'|'stream', content} */
    const push=o=>{objs.push(o);return objs.length;}; /* returns 1-based obj num */

    /* Font objects */
    const fRegNum=push({type:'dict',content:'<</Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding>>'});
    const fBldNum=push({type:'dict',content:'<</Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding>>'});
    const resNum =push({type:'dict',content:`<</Font <</F1 ${fRegNum} 0 R /F2 ${fBldNum} 0 R>>>>`});

    /* Page content streams + page dicts */
    const pageNums=[];
    this.pageStreams.forEach(stream=>{
      const s=stream||'';
      const enc=new TextEncoder().encode(s).length;
      const streamNum=push({type:'stream',length:enc,content:s});
      const pageNum =push({type:'page',streamNum,resNum});
      pageNums.push(pageNum);
    });

    /* Pages tree + catalog */
    const kids=pageNums.map(n=>`${n} 0 R`).join(' ');
    const pagesNum  =push({type:'dict',content:`<</Type /Pages /Kids [${kids}] /Count ${pageNums.length}>>`});
    const catalogNum=push({type:'dict',content:`<</Type /Catalog /Pages ${pagesNum} 0 R>>`});

    /* Serialize */
    let out='%PDF-1.4\n%\xe2\xe3\xcf\xd3\n';
    const offsets=new Array(objs.length+1);

    objs.forEach((o,i)=>{
      const num=i+1;
      offsets[num]=out.length;
      if(o.type==='dict'){
        out+=`${num} 0 obj\n${o.content}\nendobj\n`;
      } else if(o.type==='stream'){
        out+=`${num} 0 obj\n<</Length ${o.length}>>\nstream\n${o.content}\nendstream\nendobj\n`;
      } else if(o.type==='page'){
        out+=`${num} 0 obj\n<</Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${this.pageW} ${this.pageH}] /Contents ${o.streamNum} 0 R /Resources ${o.resNum} 0 R>>\nendobj\n`;
      }
    });

    /* xref table */
    const xrefPos=out.length;
    const total=objs.length+1;
    out+=`xref\n0 ${total}\n0000000000 65535 f \n`;
    for(let n=1;n<total;n++){
      out+=(offsets[n]||0).toString().padStart(10,'0')+' 00000 n \n';
    }
    out+=`trailer\n<</Size ${total} /Root ${catalogNum} 0 R>>\nstartxref\n${xrefPos}\n%%EOF`;

    /* base64 encode */
    const bytes=new Uint8Array(out.length);
    for(let i=0;i<out.length;i++)bytes[i]=out.charCodeAt(i)&0xff;
    let b64='';
    const chunk=8192;
    for(let i=0;i<bytes.length;i+=chunk)b64+=btoa(String.fromCharCode(...bytes.slice(i,i+chunk)));
    return b64;
  }
}

function stamp(){return new Date().toLocaleDateString().replace(/\//g,'-');}
function dl(href,filename){
  /* Try standard download link first; fall back to new tab for Silk/Android */
  const a=document.createElement('a');
  a.href=href;
  a.download=filename;
  a.target='_blank';

/* ── Exam Timer ── */
var TIMER_TOTAL=35*60; /* 35 minutes in seconds */
var TIMER_WARN=5*60;   /* warn beep at 30 min = 5 min remaining */
var timerSecondsLeft=TIMER_TOTAL;
var timerRunning=false;
var timerPaused=false;
var timerInterval=null;
var timerWarnFired=false;
var timerEndFired=false;

function timerStart(){
  timerSecondsLeft=TIMER_TOTAL;
  timerRunning=true;
  timerPaused=false;
  timerWarnFired=false;
  timerEndFired=false;
  timerRender();
  document.getElementById('timerBar').style.display='flex';
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(timerTick,1000);
}

function timerTick(){
  if(!timerRunning||timerPaused)return;
  timerSecondsLeft--;
  if(timerSecondsLeft<=0){
    timerSecondsLeft=0;
    timerRender();
    if(!timerEndFired){
      timerEndFired=true;
      timerBeep(3); /* triple beep at time's up */
    }
    clearInterval(timerInterval);
    timerRunning=false;
    return;
  }
  if(!timerWarnFired&&timerSecondsLeft<=TIMER_WARN){
    timerWarnFired=true;
    timerBeep(1); /* single beep at 30 min */
  }
  timerRender();
}

function timerTogglePause(){
  if(!timerRunning&&timerSecondsLeft===0)return; /* expired — do nothing */
  timerPaused=!timerPaused;
  timerRender();
}

function timerRender(){
  var bar=document.getElementById('timerBar');
  var disp=document.getElementById('timerDisplay');
  var btn=document.getElementById('timerPauseBtn');
  var lbl=document.getElementById('timerLabel');
  var m=Math.floor(timerSecondsLeft/60);
  var s=timerSecondsLeft%60;
  disp.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  bar.className='timer-bar';
  if(!timerRunning&&timerSecondsLeft===0){
    bar.classList.add('warn');
    lbl.textContent='Time is up!';
    btn.textContent='Done';
    btn.disabled=true;
  } else if(timerPaused){
    bar.classList.add('paused');
    lbl.textContent='Timer paused';
    btn.textContent='Resume';
    btn.disabled=false;
  } else if(timerSecondsLeft<=TIMER_WARN){
    bar.classList.add('warn');
    lbl.textContent='5 min remaining!';
    btn.textContent='Pause';
    btn.disabled=false;
  } else {
    lbl.textContent='Exam Timer';
    btn.textContent='Pause';
    btn.disabled=false;
  }
}

function timerEndExam(){
  if(!timerRunning&&timerSecondsLeft===TIMER_TOTAL)return;
  /* Calculate elapsed */
  var elapsed=TIMER_TOTAL-timerSecondsLeft;
  var em=Math.floor(elapsed/60),es=elapsed%60;
  var elapsedStr=(em<10?'0':'')+em+':'+(es<10?'0':'')+es;
  /* Stop timer */
  clearInterval(timerInterval);
  timerRunning=false;
  timerSecondsLeft=TIMER_TOTAL; /* reset for next student */
  timerWarnFired=false;
  timerEndFired=false;
  timerPaused=false;
  document.getElementById('timerBar').style.display='none';
  /* Store elapsed on current student */
  if(S.cur&&S.students[S.cur]){
    S.students[S.cur].elapsed=elapsedStr;
    ss();
  }
  /* Refresh eval view so Start Timer button label updates */
  if(ready())renderEval(S.tab);
}

function timerShowEndBtn(show){
  var btn=document.getElementById('timerEndBtn');
  if(btn)btn.style.display=(show&&(timerRunning||timerPaused))?'block':'none';
}

function timerBeep(count){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var t=ctx.currentTime;
    for(var i=0;i<count;i++){
      (function(offset){
        var osc=ctx.createOscillator();
        var gain=ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type='sine';
        osc.frequency.value=880;
        gain.gain.setValueAtTime(0,t+offset);
        gain.gain.linearRampToValueAtTime(0.4,t+offset+0.02);
        gain.gain.setValueAtTime(0.4,t+offset+0.18);
        gain.gain.linearRampToValueAtTime(0,t+offset+0.22);
        osc.start(t+offset);
        osc.stop(t+offset+0.25);
      })(i*0.35);
    }
  }catch(e){}
}

/* ── Wire all static buttons once on load ── */
document.getElementById('btnAddCancel').addEventListener('click', closeSheet);
document.getElementById('btnAddConfirm').addEventListener('click', addStudent);
document.getElementById('nameIn').addEventListener('keydown', function(e){if(e.key==='Enter')addStudent();});
document.getElementById('btnExportPDF').addEventListener('click', doExportPDF);
document.getElementById('btnExportCSV').addEventListener('click', doExportCSV);
document.getElementById('btnExportTXT').addEventListener('click', doExportTXT);
document.getElementById('btnSummClose').addEventListener('click', closeSheet);
document.getElementById('btnClearAll').addEventListener('click', confirmClearAll);
document.getElementById('btnClearBack').addEventListener('click', showSummary);
document.getElementById('btnClearConfirm').addEventListener('click', clearAllStudents);
document.getElementById('summaryRows').addEventListener('click', function(e){
  var el=e.target;
  /* walk up a couple levels in case tap hit a child element */
  for(var i=0;i<3;i++){
    if(el&&el.getAttribute&&el.getAttribute('data-sname')){
      var name=decodeURIComponent(el.getAttribute('data-sname'));
      var val=el.getAttribute('data-val');
      setFinalVerdict(name,val);
      return;
    }
    el=el&&el.parentNode;
  }
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});

ls();renderAll();
